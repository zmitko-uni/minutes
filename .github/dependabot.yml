#
# Dependabot tracks ONLY Minutes-owned npm deps (not Signal upstream).
# Electron / RingRTC / libsignal / … arrive via Merge Signal upstream.
# When adding a new Minutes-only dependency, also add it under allow: below
# (see .cursor/rules/minutes-dependabot.mdc).

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-actions-dependencies:
        # Only group minor and patch updates (review majors carefully)
        update-types: [minor, patch]

  - package-ecosystem: npm
    directories:
      - '/'
    schedule:
      interval: weekly
    allow:
      - dependency-name: node-llama-cpp
      - dependency-name: whisper-cpp-node
      - dependency-name: resedit
