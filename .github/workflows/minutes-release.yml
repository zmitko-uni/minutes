# Build Windows installer and publish GitHub Release.
#
# Manual (workflow_dispatch): bumps version, updates CHANGELOG, builds, commits, publishes.
# Push with chore(release): version already in package.json — build and publish only.
name: Release Minutes

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip auto bump (rebuild same version from package.json)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: minutes-release
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build & publish Windows installer
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(release):'))
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Configure git
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Generate build artifacts
        run: pnpm run generate
        env:
          NODE_CONFIG_ENV: minutes

      - name: Generate minutes icons
        run: pnpm run build:minutes-icons
        env:
          NODE_CONFIG_ENV: minutes

      - name: Typecheck
        run: pnpm run check:types

      - name: Bump version and prepare CHANGELOG
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        run: pnpm run release:minutes:metadata

      - name: Read release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Verify CHANGELOG has release section
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const marker = '## [' + version + ']';
            if (!changelog.includes(marker)) {
              console.error('CHANGELOG.md missing section ' + marker);
              process.exit(1);
            }
          " "${VERSION}"

      - name: Build installer
        run: pnpm run build:minutes:installer
        env:
          MINUTES_SKIP_VERSION_BUMP: '1'
          MINUTES_SKIP_GENERATE: '1'
          NODE_CONFIG_ENV: minutes
          DISABLE_INSPECT_FUSE: on

      - name: Prepare release assets
        shell: bash
        run: |
          INSTALLER=$(ls release/minutes/Minutes-setup-*.exe | head -n 1)
          if [ -z "${INSTALLER}" ]; then
            echo "Installer .exe not found in release/minutes/"
            exit 1
          fi
          cp "${INSTALLER}" "release/minutes/Minutes-setup-windows-x64.exe"
          echo "INSTALLER=${INSTALLER}" >> "$GITHUB_ENV"
          echo "ASSET_STABLE=release/minutes/Minutes-setup-windows-x64.exe" >> "$GITHUB_ENV"
          ls -la release/minutes/*.exe

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        shell: bash
        run: |
          git add package.json CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No release metadata changes to commit"
          else
            git commit -m "chore(release): Minutes ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          node scripts/extract-changelog-release.mjs "${VERSION}" > "${NOTES_FILE}"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --title "Minutes ${VERSION}" \
            --latest \
            --notes-file "${NOTES_FILE}" \
            "${INSTALLER}" \
            "${ASSET_STABLE}"
