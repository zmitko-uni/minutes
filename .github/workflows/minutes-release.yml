# Build Windows installer and publish GitHub Release (prod or beta).
#
# Prod (main): stable release, GitHub --latest
# Beta (beta): pre-release for testing confirmed fixes
#
# Manual: workflow_dispatch with release_channel
# Auto: push with chore(release): on main or beta
name: Release Minutes

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Release channel — beta = pre-release on branch beta, prod = stable on main'
        required: false
        default: prod
        type: choice
        options:
          - prod
          - beta
      skip_version_bump:
        description: 'Skip auto bump (rebuild same version from package.json)'
        required: false
        default: false
        type: boolean
      bump_level:
        description: 'Prod semver bump (patch/minor/major). Beta always increments -beta.N'
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: minutes-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build & publish Windows installer
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        contains(github.event.head_commit.message, 'chore(release):') &&
        !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="${{ inputs.release_channel || 'prod' }}"
          elif [ "${{ github.ref_name }}" = "beta" ]; then
            CHANNEL="beta"
          else
            CHANNEL="prod"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${CHANNEL} (branch ${{ github.ref_name }})"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Configure git
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Bump version and prepare CHANGELOG
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        env:
          MINUTES_RELEASE_CHANNEL: ${{ steps.channel.outputs.channel }}
          MINUTES_BUMP_LEVEL: ${{ inputs.bump_level || 'patch' }}
        run: pnpm run release:minutes:metadata

      - name: Read release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Verify CHANGELOG has release section
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const marker = '## [' + version + ']';
            if (!changelog.includes(marker)) {
              console.error('CHANGELOG.md missing section ' + marker);
              process.exit(1);
            }
          " "${VERSION}"

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true
        shell: bash
        run: |
          git add package.json CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No release metadata changes to commit"
          else
            if [ "${{ steps.channel.outputs.channel }}" = "beta" ]; then
              MSG="chore(release): [beta] Minutes ${{ steps.version.outputs.version }} [skip ci]"
            else
              MSG="chore(release): Minutes ${{ steps.version.outputs.version }} [skip ci]"
            fi
            git commit -m "${MSG}"
            git stash push -u -m "ci-before-rebase" --quiet || true
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
            git stash drop --quiet 2>/dev/null || true
          fi

      - name: Generate build artifacts
        run: pnpm run generate
        env:
          NODE_CONFIG_ENV: minutes

      - name: Generate minutes icons
        run: pnpm run build:minutes-icons
        env:
          NODE_CONFIG_ENV: minutes

      - name: Typecheck
        run: pnpm run check:types

      - name: Build installer
        run: pnpm run build:minutes:installer
        env:
          MINUTES_SKIP_VERSION_BUMP: '1'
          MINUTES_SKIP_GENERATE: '1'
          MINUTES_SKIP_ICONS: '1'
          MINUTES_SKIP_BUNDLES: '1'
          MINUTES_RELEASE_CHANNEL: ${{ steps.channel.outputs.channel }}
          NODE_CONFIG_ENV: minutes
          DISABLE_INSPECT_FUSE: on

      - name: Prepare release assets
        shell: bash
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"
          if [ "${CHANNEL}" = "beta" ]; then
            INSTALLER=$(ls release/minutes/Minutes-Beta-setup-*.exe | head -n 1)
            STABLE_NAME="Minutes-Beta-setup-windows-x64.exe"
          else
            INSTALLER=$(ls release/minutes/Minutes-setup-*.exe | head -n 1)
            STABLE_NAME="Minutes-setup-windows-x64.exe"
          fi
          if [ -z "${INSTALLER}" ]; then
            echo "Installer .exe not found in release/minutes/"
            exit 1
          fi
          cp "${INSTALLER}" "release/minutes/${STABLE_NAME}"
          echo "INSTALLER=${INSTALLER}" >> "$GITHUB_ENV"
          echo "ASSET_STABLE=release/minutes/${STABLE_NAME}" >> "$GITHUB_ENV"
          ls -la release/minutes/*.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.channel.outputs.channel }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          node scripts/extract-changelog-release.mjs "${VERSION}" > "${NOTES_FILE}"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          if [ "${CHANNEL}" = "beta" ]; then
            gh release create "${TAG}" \
              --title "Minutes ${VERSION} (beta)" \
              --prerelease \
              --notes-file "${NOTES_FILE}" \
              "${INSTALLER}" \
              "${ASSET_STABLE}"
          else
            gh release create "${TAG}" \
              --title "Minutes ${VERSION}" \
              --latest \
              --notes-file "${NOTES_FILE}" \
              "${INSTALLER}" \
              "${ASSET_STABLE}"
          fi

  release-macos:
    name: Build & publish macOS installer
    needs: release-windows
    # macOS ships prod-only (arm64 dmg, no beta variant); skip on beta so the
    # stable Minutes-mac-arm64.dmg is never overwritten by a beta build.
    if: needs.release-windows.result == 'success' && needs.release-windows.outputs.channel == 'prod'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Generate build artifacts
        run: pnpm run generate
        env:
          NODE_CONFIG_ENV: minutes

      - name: Generate minutes icons
        run: pnpm run build:minutes-icons
        env:
          NODE_CONFIG_ENV: minutes

      - name: Typecheck
        run: pnpm run check:types

      - name: Read release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Verify CHANGELOG has release section
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const marker = '## [' + version + ']';
            if (!changelog.includes(marker)) {
              console.error('CHANGELOG.md missing section ' + marker);
              process.exit(1);
            }
          " "${VERSION}"

      - name: Build installer
        run: pnpm run build:minutes:installer
        env:
          MINUTES_SKIP_VERSION_BUMP: '1'
          MINUTES_SKIP_GENERATE: '1'
          NODE_CONFIG_ENV: minutes
          DISABLE_INSPECT_FUSE: on

      - name: Prepare release assets
        shell: bash
        run: |
          INSTALLER=$(ls release/minutes/*.dmg | head -n 1)
          if [ -z "${INSTALLER}" ]; then
            echo "Installer .dmg not found in release/minutes/"
            exit 1
          fi
          cp "${INSTALLER}" "release/minutes/Minutes-mac-arm64.dmg"
          echo "INSTALLER=${INSTALLER}" >> "$GITHUB_ENV"
          echo "ASSET_STABLE=release/minutes/Minutes-mac-arm64.dmg" >> "$GITHUB_ENV"
          ls -la release/minutes/*.dmg

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "${TAG}" "${INSTALLER}" "${ASSET_STABLE}" --clobber
