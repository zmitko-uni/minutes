# Build Windows installer and publish GitHub Release when version is bumped on main.
name: Release Minutes

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - CHANGELOG.md
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Release this version from package.json even if tag exists (rebuild)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: minutes-release
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build & publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Decide whether to release
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_version && '1' || '0' }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

          if [ "${FORCE}" = "1" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested."
            exit 0
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists — skipping build."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Will create release ${TAG}."
          fi

      - name: Verify CHANGELOG has release section
        if: steps.gate.outputs.release == 'true'
        shell: bash
        run: |
          VERSION="${{ steps.gate.outputs.version }}"
          node -e "
            const fs = require('fs');
            const version = process.argv[1];
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const marker = '## [' + version + ']';
            if (!changelog.includes(marker)) {
              console.error('CHANGELOG.md missing section ' + marker);
              console.error('Run: pnpm run release:minutes:metadata');
              console.error('Then commit package.json + CHANGELOG.md and push.');
              process.exit(1);
            }
          " "${VERSION}"

      - name: Install dependencies
        if: steps.gate.outputs.release == 'true'
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Generate build artifacts
        if: steps.gate.outputs.release == 'true'
        run: pnpm run generate
        env:
          NODE_CONFIG_ENV: minutes

      - name: Generate minutes icons
        if: steps.gate.outputs.release == 'true'
        run: pnpm run build:minutes-icons
        env:
          NODE_CONFIG_ENV: minutes

      - name: Typecheck
        if: steps.gate.outputs.release == 'true'
        run: pnpm run check:types

      - name: Build installer
        if: steps.gate.outputs.release == 'true'
        run: pnpm run build:minutes:installer
        env:
          MINUTES_SKIP_VERSION_BUMP: '1'
          MINUTES_SKIP_GENERATE: '1'
          NODE_CONFIG_ENV: minutes
          DISABLE_INSPECT_FUSE: on

      - name: Prepare release assets
        if: steps.gate.outputs.release == 'true'
        shell: bash
        run: |
          INSTALLER=$(ls release/minutes/Minutes-setup-*.exe | head -n 1)
          if [ -z "${INSTALLER}" ]; then
            echo "Installer .exe not found in release/minutes/"
            exit 1
          fi
          cp "${INSTALLER}" "release/minutes/Minutes-setup-windows-x64.exe"
          echo "INSTALLER=${INSTALLER}" >> "$GITHUB_ENV"
          echo "ASSET_STABLE=release/minutes/Minutes-setup-windows-x64.exe" >> "$GITHUB_ENV"
          ls -la release/minutes/*.exe

      - name: Create GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.gate.outputs.tag }}"
          VERSION="${{ steps.gate.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          node scripts/extract-changelog-release.mjs "${VERSION}" > "${NOTES_FILE}"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --title "Minutes ${VERSION}" \
            --latest \
            --notes-file "${NOTES_FILE}" \
            "${INSTALLER}" \
            "${ASSET_STABLE}"
