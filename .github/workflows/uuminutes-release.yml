# Build Windows installer and publish GitHub Release (visible on repo homepage).
name: Release Minutes

on:
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: 'Skip auto bump of package.json version (rebuild same version)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: uuminutes-release
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build & publish Windows installer
    runs-on: windows-latest-8-cores
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose

      - name: Generate build artifacts
        run: pnpm run generate
        env:
          NODE_CONFIG_ENV: uuminutes

      - name: Typecheck
        run: pnpm run check:types

      - name: Bump version
        if: inputs.skip_version_bump != true
        run: pnpm run bump:uuminutes:release

      - name: Read release version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Build installer
        run: pnpm run build:uuminutes:installer
        env:
          UUMINUTES_SKIP_VERSION_BUMP: '1'
          NODE_CONFIG_ENV: uuminutes
          DISABLE_INSPECT_FUSE: on

      - name: Prepare release assets
        shell: bash
        run: |
          INSTALLER=$(ls release/uuminutes/Minutes-setup-*.exe | head -n 1)
          if [ -z "${INSTALLER}" ]; then
            echo "Installer .exe not found in release/uuminutes/"
            exit 1
          fi
          cp "${INSTALLER}" "release/uuminutes/Minutes-setup-windows-x64.exe"
          echo "INSTALLER=${INSTALLER}" >> "$GITHUB_ENV"
          echo "ASSET_STABLE=release/uuminutes/Minutes-setup-windows-x64.exe" >> "$GITHUB_ENV"
          ls -la release/uuminutes/*.exe

      - name: Commit version bump
        if: inputs.skip_version_bump != true
        run: |
          git add package.json
          if git diff --staged --quiet; then
            echo "No package.json changes to commit"
          else
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          node scripts/extract-changelog-release.mjs "${VERSION}" > "${NOTES_FILE}"

          gh release delete "${TAG}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          gh release create "${TAG}" \
            --title "Minutes ${VERSION}" \
            --latest \
            --notes-file "${NOTES_FILE}" \
            "${INSTALLER}" \
            "${ASSET_STABLE}"
