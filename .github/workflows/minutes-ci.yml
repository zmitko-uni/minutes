# Lightweight CI for Minutes — typecheck after generate (fast feedback on PRs).
# Runs on PRs only (not every push to main) to save GitHub Actions minutes;
# Release Minutes already typechecks before packaging.
name: Minutes CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: minutes-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck (Minutes)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache electron-gyp
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.electron-gyp
          key: electron-gyp-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install libpulse0
        run: sudo apt-get install -y libpulse0 || (sudo apt-get update && sudo apt-get install -y libpulse0)

      - name: Install dependencies
        run: pnpm install
        env:
          NPM_CONFIG_LOGLEVEL: verbose
          NPM_CONFIG_NODE_GYP: echo

      - name: Generate build artifacts
        run: pnpm run generate

      - name: Typecheck
        run: pnpm run check:types
