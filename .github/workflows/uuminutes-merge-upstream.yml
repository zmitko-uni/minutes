# Merge Signal Desktop upstream into Minutes (manual trigger).
# Signal upstream is NOT a git remote in this repo — fetched only in CI.
name: Merge Signal upstream

on:
  workflow_dispatch:
    inputs:
      signal_ref:
        description: 'Signal Desktop branch or tag (e.g. main, v8.21.0-alpha.1)'
        required: true
        default: main
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Minutes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create sync branch
        run: |
          BRANCH="sync/signal-${GITHUB_RUN_ID}"
          echo "SYNC_BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          git checkout -b "${BRANCH}"

      - name: Merge Signal Desktop
        run: node scripts/merge-upstream.mjs "${{ inputs.signal_ref }}"

      - name: Refresh lockfile after merge
        run: pnpm install --frozen-lockfile=false

      - name: Commit lockfile updates
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: refresh pnpm-lock after Signal upstream merge"
          fi

      - name: Push sync branch
        run: git push origin "HEAD:${SYNC_BRANCH}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${SYNC_BRANCH}" \
            --title "Sync Signal Desktop (${{ inputs.signal_ref }})" \
            --body "$(cat <<'EOF'
          Automated upstream merge from [signalapp/Signal-Desktop](https://github.com/signalapp/Signal-Desktop).

          **Signal ref:** `${{ inputs.signal_ref }}`

          ## Review checklist
          - [ ] Konflikty vyřešeny (workflow selže, pokud merge neprojde)
          - [ ] `docs/UUMINUTES-PATCHES.md` — hooky v upstream souborech stále na místě
          - [ ] `pnpm run check:types` lokálně OK
          - [ ] `pnpm run start:uuminutes:quick` — aplikace startuje

          Po merge zkontroluj `ts/uuminutes/welcomeContent.std.ts` (`UUMINUTES_SIGNAL_BASE_VERSION`).
          EOF
          )"
