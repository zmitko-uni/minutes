# Check for a newer stable Signal Desktop tag (weekly) and/or merge upstream (manual).
# Signal upstream is NOT a git remote in this repo — fetched only in CI.
name: Merge Signal upstream

on:
  schedule:
    # Monday 08:00 UTC — cheap tag check; merge job runs only when a new stable tag exists.
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      signal_ref:
        description: 'Signal Desktop branch or tag (e.g. main, v8.21.0-alpha.1). Ignored on schedule / dry_run — those use latest stable tag.'
        required: true
        default: main
        type: string
      dry_run:
        description: 'Dry run — only check for a newer stable Signal tag (no merge, no PR)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check Signal version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_sync: ${{ steps.resolve.outputs.should_sync }}
      signal_ref: ${{ steps.resolve.outputs.signal_ref }}
    steps:
      - name: Checkout Minutes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc

      - name: Resolve whether to sync
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" != "true" ]; then
            REF="${{ inputs.signal_ref }}"
            echo "Manual dispatch — syncing ref: ${REF}"
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
            echo "signal_ref=${REF}" >> "$GITHUB_OUTPUT"
          else
            node scripts/check-signal-upstream.mjs
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "Dry run — merge/PR skipped"
              echo "should_sync=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  merge-upstream:
    name: Merge Signal upstream
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Minutes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create sync branch
        run: |
          BRANCH="sync/signal-${GITHUB_RUN_ID}"
          echo "SYNC_BRANCH=${BRANCH}" >> "$GITHUB_ENV"
          git checkout -b "${BRANCH}"

      - name: Merge Signal Desktop
        run: node scripts/merge-upstream.mjs "${{ needs.check.outputs.signal_ref }}"

      - name: Install libpulse0
        run: sudo apt-get install -y libpulse0 || (sudo apt-get update && sudo apt-get install -y libpulse0)

      - name: Refresh lockfile after merge
        run: pnpm install --frozen-lockfile=false
        env:
          NPM_CONFIG_NODE_GYP: echo

      - name: Generate build artifacts
        run: pnpm run generate

      - name: Typecheck
        run: pnpm run check:types

      - name: Commit lockfile updates
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: refresh pnpm-lock after Signal upstream merge"
          fi

      - name: Push sync branch
        run: git push origin "HEAD:${SYNC_BRANCH}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF="${{ needs.check.outputs.signal_ref }}"
          gh pr create \
            --base main \
            --head "${SYNC_BRANCH}" \
            --title "Sync Signal Desktop (${REF})" \
            --body "$(cat <<EOF
          Automated upstream merge from [signalapp/Signal-Desktop](https://github.com/signalapp/Signal-Desktop).

          **Signal ref:** \`${REF}\`

          ## Review checklist
          - [ ] Konflikty vyřešeny (workflow selže, pokud merge neprojde)
          - [ ] \`docs/MINUTES-PATCHES.md\` — hooky v upstream souborech stále na místě
          - [ ] Minutes CI / \`pnpm run check:types\` prošlo (workflow to spouští automaticky)
          - [ ] \`pnpm run start:minutes:quick\` — aplikace startuje lokálně
          - [ ] \`CHANGELOG.md\` — doplnit změny ze Signálu pokud relevantní

          Po merge zkontroluj \`ts/minutes/version.std.ts\` (\`MINUTES_SIGNAL_BASE_VERSION\`).
          EOF
          )"
